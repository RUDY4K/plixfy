<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 384" width="512" height="384">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7cd1ff"/>
      <stop offset="100%" stop-color="#3a98e8"/>
    </linearGradient>
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7fde4a"/>
      <stop offset="50%" stop-color="#52a626"/>
      <stop offset="100%" stop-color="#2f6a14"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4ad60"/>
      <stop offset="100%" stop-color="#8a6a2c"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="512" height="384" fill="url(#sky)"/>
  <!-- Clouds -->
  <g fill="#ffffff" opacity="0.85">
    <ellipse cx="80" cy="70" rx="34" ry="14"/>
    <ellipse cx="110" cy="60" rx="22" ry="10"/>
    <ellipse cx="380" cy="100" rx="40" ry="15"/>
    <ellipse cx="410" cy="92" rx="24" ry="11"/>
    <ellipse cx="200" cy="280" rx="28" ry="11"/>
  </g>
  <!-- Pipes (right side) -->
  <g>
    <rect x="360" y="0" width="72" height="120" fill="url(#pipe)" stroke="#1f4609" stroke-width="3"/>
    <rect x="350" y="110" width="92" height="22" fill="url(#pipe)" stroke="#1f4609" stroke-width="3"/>
    <rect x="360" y="240" width="72" height="144" fill="url(#pipe)" stroke="#1f4609" stroke-width="3"/>
    <rect x="350" y="232" width="92" height="22" fill="url(#pipe)" stroke="#1f4609" stroke-width="3"/>
  </g>
  <!-- Bird -->
  <g transform="translate(180, 180)">
    <!-- body -->
    <ellipse cx="0" cy="0" rx="42" ry="34" fill="#ffd24a" stroke="#a96d00" stroke-width="3"/>
    <!-- belly -->
    <ellipse cx="-4" cy="6" rx="26" ry="20" fill="#fff2a8"/>
    <!-- wing -->
    <path d="M -22 -2 Q -8 18 12 6 Q 0 -10 -22 -2 Z" fill="#f0a900" stroke="#a96d00" stroke-width="2"/>
    <!-- eye -->
    <circle cx="18" cy="-10" r="9" fill="#ffffff" stroke="#5a3a00" stroke-width="2"/>
    <circle cx="20" cy="-10" r="4" fill="#1a1a1a"/>
    <!-- beak -->
    <polygon points="34,-4 50,0 34,6" fill="#ff7a1a" stroke="#a13a00" stroke-width="2"/>
  </g>
  <!-- Ground band -->
  <rect x="0" y="340" width="512" height="44" fill="url(#ground)"/>
  <rect x="0" y="338" width="512" height="6" fill="#6db83c"/>
  <!-- Title chip -->
  <g transform="translate(20, 22)">
    <rect width="146" height="34" rx="8" fill="rgba(0,0,0,0.55)"/>
    <text x="73" y="23" text-anchor="middle"
          font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#ffffff" letter-spacing="0.04em">FLAP HERO</text>
  </g>
</svg>
