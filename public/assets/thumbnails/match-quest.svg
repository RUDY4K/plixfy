<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 384" width="512" height="384">
  <defs>
    <linearGradient id="mqBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b9a2fb"/>
      <stop offset="100%" stop-color="#5a3f96"/>
    </linearGradient>
    <linearGradient id="cardBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cd0"/>
      <stop offset="100%" stop-color="#3a206e"/>
    </linearGradient>
    <linearGradient id="cardFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0e8ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="384" fill="url(#mqBg)"/>
  <!-- Decorative sparkles -->
  <g fill="rgba(255,255,255,0.25)">
    <circle cx="40" cy="60" r="3"/>
    <circle cx="470" cy="80" r="4"/>
    <circle cx="60" cy="320" r="3"/>
    <circle cx="450" cy="340" r="3"/>
    <circle cx="250" cy="40" r="2"/>
  </g>
  <!-- Card grid: 2 rows x 3 cols, centered. Cards: 92x130, gap 20 -->
  <!-- Total grid width = 92*3 + 20*2 = 316; offset x = (512-316)/2 = 98 -->
  <!-- Total grid height = 130*2 + 20 = 280; offset y = (384-280)/2 = 52 -->
  <g font-family="'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji', system-ui, sans-serif" text-anchor="middle">
    <!-- Row 1 -->
    <!-- Face-up cat -->
    <g transform="translate(98, 52)">
      <rect width="92" height="130" rx="12" fill="url(#cardFace)" stroke="#3a206e" stroke-width="3"/>
      <text x="46" y="92" font-size="58">🐱</text>
    </g>
    <!-- Face-down -->
    <g transform="translate(210, 52)">
      <rect width="92" height="130" rx="12" fill="url(#cardBack)" stroke="#1f1240" stroke-width="3"/>
      <circle cx="46" cy="65" r="22" fill="none" stroke="#ffd24a" stroke-width="3"/>
      <text x="46" y="76" font-size="32" fill="#ffd24a" font-weight="800" font-family="system-ui, sans-serif">?</text>
    </g>
    <!-- Face-up dog -->
    <g transform="translate(322, 52)">
      <rect width="92" height="130" rx="12" fill="url(#cardFace)" stroke="#3a206e" stroke-width="3"/>
      <text x="46" y="92" font-size="58">🐶</text>
    </g>
    <!-- Row 2 -->
    <!-- Face-down -->
    <g transform="translate(98, 202)">
      <rect width="92" height="130" rx="12" fill="url(#cardBack)" stroke="#1f1240" stroke-width="3"/>
      <circle cx="46" cy="65" r="22" fill="none" stroke="#ffd24a" stroke-width="3"/>
      <text x="46" y="76" font-size="32" fill="#ffd24a" font-weight="800" font-family="system-ui, sans-serif">?</text>
    </g>
    <!-- Face-up lion -->
    <g transform="translate(210, 202)">
      <rect width="92" height="130" rx="12" fill="url(#cardFace)" stroke="#3a206e" stroke-width="3"/>
      <text x="46" y="92" font-size="58">🦁</text>
    </g>
    <!-- Face-down -->
    <g transform="translate(322, 202)">
      <rect width="92" height="130" rx="12" fill="url(#cardBack)" stroke="#1f1240" stroke-width="3"/>
      <circle cx="46" cy="65" r="22" fill="none" stroke="#ffd24a" stroke-width="3"/>
      <text x="46" y="76" font-size="32" fill="#ffd24a" font-weight="800" font-family="system-ui, sans-serif">?</text>
    </g>
  </g>
  <!-- Title chip -->
  <g transform="translate(20, 22)">
    <rect width="162" height="34" rx="8" fill="rgba(0,0,0,0.55)"/>
    <text x="81" y="23" text-anchor="middle"
          font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#ffffff" letter-spacing="0.04em">MATCH QUEST</text>
  </g>
</svg>
