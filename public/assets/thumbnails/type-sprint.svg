<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 384" width="512" height="384">
  <defs>
    <linearGradient id="tsBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f06dad"/>
      <stop offset="100%" stop-color="#5e1c43"/>
    </linearGradient>
    <linearGradient id="keyTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6f6f6"/>
      <stop offset="100%" stop-color="#bdbdbd"/>
    </linearGradient>
  </defs>
  <rect width="512" height="384" fill="url(#tsBg)"/>
  <!-- Floating letters (the words user is typing) -->
  <g font-family="'JetBrains Mono','Courier New', monospace" font-weight="800" text-anchor="middle">
    <g transform="translate(80, 80) rotate(-12)">
      <rect x="-22" y="-22" width="44" height="44" rx="6" fill="#ffd34a" stroke="#a96d00" stroke-width="3"/>
      <text y="10" font-size="28" fill="#5a3a00">W</text>
    </g>
    <g transform="translate(170, 60) rotate(6)">
      <rect x="-22" y="-22" width="44" height="44" rx="6" fill="#7cd1ff" stroke="#0a5078" stroke-width="3"/>
      <text y="10" font-size="28" fill="#0a3050">P</text>
    </g>
    <g transform="translate(256, 90) rotate(-8)">
      <rect x="-22" y="-22" width="44" height="44" rx="6" fill="#5cd06b" stroke="#1d4a13" stroke-width="3"/>
      <text y="10" font-size="28" fill="#0e3517">M</text>
    </g>
    <g transform="translate(348, 70) rotate(10)">
      <rect x="-22" y="-22" width="44" height="44" rx="6" fill="#ffffff" stroke="#5e1c43" stroke-width="3"/>
      <text y="10" font-size="28" fill="#5e1c43">!</text>
    </g>
    <g transform="translate(430, 100) rotate(-4)">
      <rect x="-22" y="-22" width="44" height="44" rx="6" fill="#ff9a5a" stroke="#a13a00" stroke-width="3"/>
      <text y="10" font-size="28" fill="#5a1e00">A</text>
    </g>
  </g>
  <!-- "QUICK" sample text being typed -->
  <g transform="translate(256, 178)" font-family="'JetBrains Mono','Courier New', monospace" text-anchor="middle">
    <rect x="-180" y="-30" width="360" height="56" rx="10" fill="rgba(0,0,0,0.45)"/>
    <text y="10" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="0.12em">
      <tspan fill="#7cf09c">QUICK</tspan>
      <tspan fill="#ffd24a"> BROWN</tspan>
      <tspan fill="#ffffff"> F<tspan opacity="0.4">OX_</tspan></tspan>
    </text>
  </g>
  <!-- Keyboard -->
  <g transform="translate(56, 232)">
    <!-- Keyboard chassis -->
    <rect width="400" height="120" rx="14" fill="#2a1c2c" stroke="#0d0612" stroke-width="3"/>
    <!-- Row 1: 10 keys, w=34, gap=4, total=10*34+9*4=376, offset=(400-376)/2=12 -->
    <g>
      <rect x="12"  y="14" width="34" height="28" rx="4" fill="url(#keyTop)"/>
      <rect x="50"  y="14" width="34" height="28" rx="4" fill="url(#keyTop)"/>
      <rect x="88"  y="14" width="34" height="28" rx="4" fill="url(#keyTop)"/>
      <rect x="126" y="14" width="34" height="28" rx="4" fill="url(#keyTop)"/>
      <rect x="164" y="14" width="34" height="28" rx="4" fill="url(#keyTop)"/>
      <rect x="202" y="14" width="34" height="28" rx="4" fill="url(#keyTop)"/>
      <rect x="240" y="14" width="34" height="28" rx="4" fill="url(#keyTop)"/>
      <rect x="278" y="14" width="34" height="28" rx="4" fill="url(#keyTop)"/>
      <rect x="316" y="14" width="34" height="28" rx="4" fill="url(#keyTop)"/>
      <rect x="354" y="14" width="34" height="28" rx="4" fill="url(#keyTop)"/>
    </g>
    <!-- Row 2 -->
    <g>
      <rect x="22"  y="48" width="34" height="28" rx="4" fill="url(#keyTop)"/>
      <rect x="60"  y="48" width="34" height="28" rx="4" fill="url(#keyTop)"/>
      <rect x="98"  y="48" width="34" height="28" rx="4" fill="url(#keyTop)"/>
      <rect x="136" y="48" width="34" height="28" rx="4" fill="url(#keyTop)"/>
      <rect x="174" y="48" width="34" height="28" rx="4" fill="url(#keyTop)"/>
      <rect x="212" y="48" width="34" height="28" rx="4" fill="url(#keyTop)"/>
      <rect x="250" y="48" width="34" height="28" rx="4" fill="url(#keyTop)"/>
      <rect x="288" y="48" width="34" height="28" rx="4" fill="url(#keyTop)"/>
      <rect x="326" y="48" width="34" height="28" rx="4" fill="url(#keyTop)"/>
    </g>
    <!-- Spacebar (highlighted, pressed) -->
    <rect x="80" y="82" width="240" height="26" rx="5" fill="#ffd24a" stroke="#a96d00" stroke-width="2"/>
  </g>
  <!-- Title chip -->
  <g transform="translate(20, 22)">
    <rect width="156" height="34" rx="8" fill="rgba(0,0,0,0.6)"/>
    <text x="78" y="23" text-anchor="middle"
          font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
          font-size="18" font-weight="800" fill="#ffffff" letter-spacing="0.04em">TYPE SPRINT</text>
  </g>
  <!-- Coming soon ribbon -->
  <g transform="translate(488, 24)">
    <rect x="-122" y="-2" width="120" height="28" rx="14" fill="rgba(0,0,0,0.6)"/>
    <text x="-62" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#fff" letter-spacing="0.06em">COMING SOON</text>
  </g>
</svg>
